<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfileIQ — AI Resume Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: 'Inter', sans-serif; background: #0e0e0e; display: flex; flex-direction: column; }
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 24px; background: #1a1a1a;
  border-bottom: 1px solid #2a2a2a; flex-shrink: 0; height: 52px;
}
.nav-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
.logo-mark { width: 30px; height: 30px; background: #F59E0B; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; color: #1a1a1a; }
.logo-name { font-size: 16px; font-weight: 900; color: #fff; letter-spacing: -0.5px; }
.logo-name span { color: #F59E0B; }
.nav-right { display: flex; align-items: center; gap: 12px; }
.nav-home { color: #888; font-size: 12px; font-weight: 600; text-decoration: none; padding: 6px 12px; border-radius: 6px; border: 1px solid #2a2a2a; transition: all 0.15s; }
.nav-home:hover { color: #fff; border-color: #444; }
.nav-badge { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); color: #F59E0B; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
.iframe-wrap { flex: 1; position: relative; overflow: hidden; }
iframe { width: 100%; height: 100%; border: none; display: block; position: absolute; inset: 0; }
.loading { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0e0e0e; gap: 16px; z-index: 10; }
.loading.hidden { display: none !important; }
.spinner { width: 40px; height: 40px; border-radius: 50%; border: 3px solid #2a2a2a; border-top-color: #F59E0B; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { color: #666; font-size: 13px; }
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo" target="_blank" rel="noopener">
    <div class="logo-mark">IQ</div>
    <div class="logo-name">Profile<span>IQ</span></div>
  </a>
  <div class="nav-right">
    <span class="nav-badge">AI Powered</span>
    <a href="/" class="nav-home" target="_blank" rel="noopener">Back to home</a>
  </div>
</nav>
<div class="iframe-wrap">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Loading ProfileIQ...</p>
  </div>
  <iframe 
    id="appFrame"
    allow="clipboard-write; clipboard-read; camera; microphone"
    sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-top-navigation allow-downloads allow-modals"
  ></iframe>
</div>
<script>
(function() {
  var BASE = 'https://profileiq-production.up.railway.app/';
  var src = BASE;

  // Handle password reset token from email
  var hash = window.location.hash;
  if (hash && hash.indexOf('access_token') !== -1) {
    try {
      var p = new URLSearchParams(hash.replace(/^#/, ''));
      var token = p.get('access_token');
      var type = p.get('type');
      if (token && type === 'recovery') {
        src = BASE + '?reset_token=' + encodeURIComponent(token) + '&type=recovery';
        window.history.replaceState(null, '', window.location.pathname + window.location.search);
      }
    } catch(e) {}
  }

  var iframe = document.getElementById('appFrame');
  iframe.src = src;
  iframe.onload = function() {
    document.getElementById('loading').classList.add('hidden');
  };
})();
</script>
</body>
</html>
